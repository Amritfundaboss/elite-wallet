<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Elite Wallet By Amrit Kar</title>
    <style>
        :root { --main-bg: #050505; --accent: #00ff00; --card-unpaid: linear-gradient(135deg, #7b0000 0%, #cc0000 100%); --card-paid: linear-gradient(135deg, #004d00 0%, #008000 100%); }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--main-bg); color: white; overflow-x: hidden; }

        /* HEADER */
        header { padding: 18px; display: flex; align-items: center; background: #111; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .menu-btn { font-size: 26px; cursor: pointer; margin-right: 15px; color: var(--accent); }
        .app-title { font-weight: 900; letter-spacing: 1.5px; font-size: 16px; color: #fff; }
        .by-line { font-size: 9px; color: #888; display: block; letter-spacing: 0.5px; }

        /* SIDEBAR DRAWER */
        .sidebar { position: fixed; left: -300px; top: 0; width: 300px; height: 100%; background: #0f0f0f; z-index: 1000; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; box-sizing: border-box; border-right: 1px solid #333; overflow-y: auto;}
        .sidebar.active { transform: translateX(300px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        .menu-header { font-size: 20px; font-weight: bold; margin-bottom: 25px; border-bottom: 1px solid #333; padding-bottom: 10px; color: var(--accent); }
        .menu-label { font-size: 11px; color: #666; margin-bottom: 10px; text-transform: uppercase; font-weight: bold; }
        
        /* THE VISUAL CARD (IMAGE FEED) */
        .container { padding: 15px; }
        .card { width: 100%; margin-bottom: 25px; border-radius: 18px; position: relative; box-sizing: border-box; display: flex; flex-direction: column; overflow: hidden; border: 2px solid; padding: 15px; transition: transform 0.2s; }
        .card:active { transform: scale(0.97); }
        
        /* Status Borders */
        .unpaid { border-color: #ff3b3b; background: rgba(255,59,59,0.1); box-shadow: 0 5px 20px rgba(255,59,59,0.3); }
        .paid { border-color: #00e600; background: rgba(0,230,0,0.1); box-shadow: 0 5px 20px rgba(0,230,0,0.3); }
        
        /* The Image */
        .card-img { width: 100%; height: auto; display: block; object-fit: contain; border-radius: 10px; }
        
        /* CARD OVERLAY & INFO */
        .card-meta-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
        .card-serial { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.7); }
        .card-digits { font-size: 10px; font-weight: bold; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }

        .card-status { font-size: 11px; font-weight: bold; margin: 8px 0; display: flex; align-items: center; gap: 5px; justify-content: center;}
        .status-unpaid { color: #ff3b3b; }
        .status-paid { color: #00e600; }

        .card-limit-row { font-size: 12px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 10px; margin-top: 5px; display: flex; justify-content: space-between; font-weight: bold; letter-spacing: 0.5px; opacity: 0.9;}

        /* INTERFACE & FORMS */
        button { padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 14px; }
        .btn-action { background: #fff; color: #000; margin-top: 15px; }
        .btn-drive { background: #4285F4; color: white; margin-bottom: 10px; }
        
        input, .file-input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; font-size: 14px; }
        .file-input { display: block; color: #aaa; font-size: 10px; margin-top: 5px; cursor: pointer;}
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div>
            <div class="app-title">ELITE 20 WALLET</div>
            <div class="by-line">BY AMRIT KAR</div>
        </div>
    </header>

    <div class="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div class="menu-header">Control Center</div>
        
        <div class="menu-label">User Account</div>
        <div id="g_id_onload" data-client_id="201507687807-o1ko23rr5j1odmibsa24vgn6gci61j8l.apps.googleusercontent.com" data-callback="onLogin"></div>
        <div class="g_id_signin" data-type="standard" data-theme="dark"></div>
        <div id="user-status" style="margin-top:10px; font-size:12px; color:#ff4d4d;">Status: Offline</div>

        <hr style="border:0; border-top:1px solid #222; margin:25px 0;">

        <div class="menu-label">Cloud Backup</div>
        <button class="btn-drive" onclick="alert('Uploading compressed image list to G-Drive...')">☁️ Backup Data</button>
        <button class="btn-drive" onclick="alert('Fetching images...')">🔄 Restore Data</button>

        <hr style="border:0; border-top:1px solid #222; margin:25px 0;">

        <div class="menu-label">Add New Image Card</div>
        <input type="text" id="bank" placeholder="Card/Bank Name (e.g. Axis)">
        <input type="number" id="last4" placeholder="Last 4 Digits">
        <input type="number" id="limit" placeholder="Credit Limit">
        <input type="number" id="day" placeholder="Statement Day (1-31)">
        
        <p style="font-size:11px; color:#888; margin-bottom:5px;">Select Card Screenshot/Photo:</p>
        <input type="file" id="card-photo" accept="image/*" class="file-input">
        
        <button style="background:var(--accent); color:black;" onclick="addCard()">+ REGISTER IMAGE CARD</button>
    </div>

    <div class="container" id="list">
        </div>

    <script>
        let cards = JSON.parse(localStorage.getItem('EliteV25_Visual_Wallet')) || [];
        const today = new Date().getDate();
        const thisMonth = new Date().getMonth();

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function onLogin(r) {
            const user = JSON.parse(atob(r.credential.split('.')[1]));
            document.getElementById('user-status').innerText = "Logged in: " + user.name;
            document.getElementById('user-status').style.color = "var(--accent)";
        }

        async function addCard() {
            const bank = document.getElementById('bank').value;
            const last4 = document.getElementById('last4').value;
            const limit = document.getElementById('limit').value;
            const day = parseInt(document.getElementById('day').value);
            const photoFile = document.getElementById('card-photo').files[0];
            let photoBase64 = "";

            if (bank && day && last4) {
                if (!photoFile) return alert("Error: Please select a card image first!");
                
                // COMPRESSION LOGIC: This turns heavy files into light strings
                const compressedPhoto = await compressPhoto(photoFile);
                cards.push({ bank, last4, limit, day, lastPaidMonth: -1, paidDate: "", photo: compressedPhoto });
                save();
                toggleMenu();
                // Clear the form
                document.getElementById('bank').value = '';
                document.getElementById('last4').value = '';
                document.getElementById('limit').value = '';
                document.getElementById('day').value = '';
                document.getElementById('card-photo').value = '';
            } else {
                alert("Error: Card Name, Last 4 Digits, and Statement Day are required.");
            }
        }

        // The Magic Speed Function: Converts image and squeezes it to thumbnail size
        const compressPhoto = file => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 450; // Thumbnail width for speed
                    const scaleFactor = MAX_WIDTH / img.width;
                    const width = MAX_WIDTH;
                    const height = img.height * scaleFactor;
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // High compression setting to keep app fast
                    resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                };
            };
        });

        function togglePaid(i) {
            const isPaid = cards[i].lastPaidMonth === thisMonth;
            cards[i].lastPaidMonth = isPaid ? -1 : thisMonth;
            if (!isPaid) {
                const d = new Date();
                cards[i].paidDate = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
            }
            save();
        }

        function save() { localStorage.setItem('EliteV25_Visual_Wallet', JSON.stringify(cards)); render(); }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            if(cards.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#444; margin-top:100px; font-weight:bold;">VISUAL WALLET EMPTY<br><span style="font-size:10px;">TAP MENU TO REGISTER AN IMAGE CARD</span></div>';
            }
            cards.forEach((c, i) => {
                const isPaid = c.lastPaidMonth === thisMonth;
                const isDue = today >= c.day;
                const div = document.createElement('div');
                div.className = `card ${isPaid ? 'paid' : 'unpaid'}`;
                
                div.innerHTML = `
                    <img src="${c.photo}" class="card-img">
                    
                    <div class="card-meta-row">
                        <div class="card-serial">${c.bank} CARD ${i+1}</div>
                        <div class="card-digits">XXXX ${c.last4}</div>
                    </div>
                    
                    <div class="card-status ${isPaid ? 'status-paid' : 'status-unpaid'}">
                        ${isPaid ? '✅ SETTLED: ' + c.paidDate : (isDue ? '🚨 BILL GENERATED' : '⌛ PENDING')}
                    </div>
                    
                    <div class="card-limit-row">
                        <span>LIMIT: ₹${Number(c.limit).toLocaleString()}</span>
                        <span>STMT: ${c.day}th</span>
                    </div>
                    
                    <button class="btn-action" onclick="togglePaid(${i})">${isPaid ? 'RESET CYCLE' : 'MARK AS PAID'}</button>
                    <button style="background:none; color:rgba(255,255,255,0.3); font-size:10px; margin-top:10px;" onclick="if(confirm('Delete Card Image?')){cards.splice(${i},1); save();}">Remove Image Card</button>
                `;
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
