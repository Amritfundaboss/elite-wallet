<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Card Manager</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 15px; background: #000; color: white; }
        .card { 
            width: 100%; margin-bottom: 15px; border-radius: 15px; padding: 20px;
            box-sizing: border-box; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .paid { background: linear-gradient(135deg, #004d00 0%, #002b00 100%); border: 1px solid #00ff00; }
        .upcoming { background: linear-gradient(135deg, #7a4a00 0%, #4d2e00 100%); border: 1px solid #ffcc00; }
        .unpaid { background: linear-gradient(135deg, #7b0000 0%, #4d0000 100%); border: 1px solid #ff0000; }

        .card-id-corner { position: absolute; top: 15px; right: 20px; font-size: 12px; color: rgba(255,255,255,0.5); }
        .card-name { font-size: 22px; font-weight: bold; text-transform: uppercase; }
        .card-info { font-size: 14px; margin: 5px 0; opacity: 0.9; }
        .pay-time { font-size: 12px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 4px 8px; border-radius: 4px; margin-top: 8px; display: inline-block; }
        .status-badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-bottom: 10px; }

        #sync-box { display: none; background: #1a1a1a; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #333; }
        .toggle-sync-btn { background: #333; color: #888; border: none; padding: 5px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; }
        .sync-btn { color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .push { background: #0088cc; }
        .pull { background: #5a5a5a; }
        .copy-raw { background: #444; font-size: 10px; padding: 5px; margin-top: 5px; width: 100%; border: none; color: #aaa; border-radius: 4px; }

        #add-form { background: #111; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; box-sizing: border-box; }
        .add-btn { background: #00ff00; color: #000; width: 100%; font-size: 16px; font-weight: bold; border: none; padding: 12px; border-radius: 8px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button.action { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .btn-pay { background: white; color: black; }
        .btn-del { background: rgba(0,0,0,0.3); color: white; border: 1px solid #555; }
        
        .footer-sig { text-align: center; font-size: 10px; color: #555; margin-top: -10px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#00ff00; margin-bottom: 5px;">💳 ELITE CARD TRACKER</h2>
    <div class="footer-sig">by Amrit Kar</div>

    <div id="sync-wrapper" style="text-align: right;">
        <button class="toggle-sync-btn" onclick="toggleSyncPanel()">☁️ GROUP CLOUD SYNC</button>
        <div id="sync-box">
            <input type="password" id="accessKey" placeholder="Secret Key">
            <button class="sync-btn pull" onclick="autoPull()">📥 AUTO-PULL FROM GROUP</button>
            <button class="sync-btn push" onclick="syncData()">📤 PUSH TO GROUP</button>
            <button class="copy-raw" onclick="copyRawData()">📋 COPY RAW DATA (JSON)</button>
            <div id="sync-status" style="margin-top:12px; color:#aaa; font-size:10px; text-align:center;">Status: Ready</div>
        </div>
    </div>

    <div id="add-form">
        <input type="text" id="name" placeholder="Bank/Card Name">
        <input type="number" id="limit" placeholder="Limit (₹)">
        <input type="number" id="day" placeholder="Billing Day (1-31)">
        <button class="add-btn" onclick="addCard()">+ ADD CARD</button>
    </div>

    <div id="list"></div>

    <script>
        const TG_TOKEN = "8798009505:AAHKQiYiP6Ry58l4IvxTvfy8DWwASy8-B5k";
        const TG_CHAT_ID = "-1003996492657"; 
        
        let cards = JSON.parse(localStorage.getItem('eliteTrackerV16')) || [];

        function toggleSyncPanel() {
            const box = document.getElementById('sync-box');
            box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
        }

        function copyRawData() {
            navigator.clipboard.writeText(JSON.stringify(cards));
            alert("Data copied to clipboard!");
        }

        async function autoPull() {
            const key = document.getElementById('accessKey').value;
            if(!key) return alert("Enter Secret Key!");
            const status = document.getElementById('sync-status');
            status.innerText = "Checking Group Updates...";

            try {
                const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/getUpdates`);
                const update = await res.json();
                
                let foundData = null;
                if(update.result) {
                    for(let i = update.result.length - 1; i >= 0; i--) {
                        const m = update.result[i].message || update.result[i].channel_post;
                        if(m && m.text && m.text.includes(`KEY: ${key}`)) {
                            const jsonMatch = m.text.match(/\[.*\]/);
                            if(jsonMatch) { foundData = JSON.parse(jsonMatch[0]); break; }
                        }
                    }
                }

                if(foundData) {
                    if(confirm(`Found ${foundData.length} cards. Update device?`)) {
                        cards = foundData; save();
                        status.innerText = "✅ Last Pulled: " + new Date().toLocaleTimeString();
                    }
                } else {
                    alert("No backup found. Make sure you Pushed from your other device first!");
                }
            } catch (e) { alert("Sync error. Check connection."); }
        }

        async function syncData() {
            const key = document.getElementById('accessKey').value;
            if(!key) return alert("Enter Key!");
            const status = document.getElementById('sync-status');
            status.innerText = "Pushing...";
            try {
                const text = `🔐 GROUP BACKUP\nKEY: ${key}\n\nDATA:\n${JSON.stringify(cards)}`;
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text })
                });
                status.innerText = "✅ Last Pushed: " + new Date().toLocaleTimeString();
            } catch (e) { status.innerText = "❌ Push Failed!"; }
        }

        function save() { localStorage.setItem('eliteTrackerV16', JSON.stringify(cards)); render(); }

        function addCard() {
            const n = document.getElementById('name').value, l = document.getElementById('limit').value, d = parseInt(document.getElementById('day').value);
            if(n && d) { cards.push({ name:n, limit:l, day:d, lastPaidMonth:-1, paidAt:null }); save(); document.querySelectorAll('#add-form input').forEach(i => i.value = ''); }
        }

        function togglePaid(i) {
            const now = new Date(), m = now.getMonth();
            if (cards[i].lastPaidMonth === m) { cards[i].lastPaidMonth = -1; cards[i].paidAt = null; }
            else {
                cards[i].lastPaidMonth = m;
                cards[i].paidAt = `${String(now.getDate()).padStart(2,'0')}/${String(now.getMonth()+1).padStart(2,'0')}/${now.getFullYear()} at ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}`;
            }
            save();
        }

        function deleteCard(i) { if(confirm("Delete?")) { cards.splice(i,1); save(); } }

        function render() {
            const list = document.getElementById('list'), today = new Date().getDate(), month = new Date().getMonth();
            list.innerHTML = '';
            cards.forEach((c, i) => {
                const isPaid = c.lastPaidMonth === month;
                const diff = c.day - today;
                let s = "unpaid", l = "UNPAID";
                if (isPaid) { s = "paid"; l = "PAID THIS MONTH"; }
                else if (today >= c.day) { s = "unpaid"; l = "BILL GENERATED (OVERDUE)"; }
                else if (diff <= 5 && diff > 0) { s = "upcoming"; l = `UPCOMING (${diff} DAYS LEFT)`; }
                const div = document.createElement('div'); div.className = `card ${s}`;
                div.innerHTML = `<div class="card-id-corner">#${i + 1}</div><div class="status-badge" style="background:rgba(0,0,0,0.5);">${l}</div><div style="font-size:18px; font-weight:bold; margin-bottom:8px;">Card Number ${i + 1}</div><div class="card-name">${c.name}</div><div class="card-info">LIMIT: ₹${Number(c.limit).toLocaleString()}</div><div class="card-info">BILLING DATE: ${c.day}th</div>${isPaid ? `<div class="pay-time">✅ Paid: ${c.paidAt}</div>` : ''}<div class="btn-group"><button class="action btn-pay" onclick="togglePaid(${i})">${isPaid ? 'UNDO' : 'MARK PAID'}</button><button class="action btn-del" onclick="deleteCard(${i})">DELETE</button></div>`;
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
