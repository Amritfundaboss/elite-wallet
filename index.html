<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <title>Elite Wallet By Amrit Kar</title>
    <style>
        :root { --main-bg: #050505; --accent: #00ff00; --debit-accent: #00d4ff; --card-unpaid: linear-gradient(135deg, #7b0000 0%, #cc0000 100%); --card-paid: linear-gradient(135deg, #004d00 0%, #008000 100%); --card-debit: linear-gradient(135deg, #002d4d 0%, #005696 100%); }
        body { font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; background: var(--main-bg); color: white; overflow-x: hidden; }

        header { padding: 18px; display: flex; align-items: center; background: #111; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .menu-btn { font-size: 26px; cursor: pointer; margin-right: 15px; color: var(--accent); }
        .app-title { font-weight: 900; letter-spacing: 1.5px; font-size: 16px; color: #fff; }
        .by-line { font-size: 9px; color: #888; display: block; letter-spacing: 0.5px; }

        /* TABS */
        .tabs { display: flex; background: #111; border-bottom: 1px solid #222; }
        .tab { flex: 1; text-align: center; padding: 12px; font-size: 12px; font-weight: bold; cursor: pointer; color: #666; transition: 0.3s; }
        .tab.active { color: white; border-bottom: 2px solid var(--accent); }
        .tab.active-debit { color: white; border-bottom: 2px solid var(--debit-accent); }

        .sidebar { position: fixed; left: -320px; top: 0; width: 320px; height: 100%; background: #0f0f0f; z-index: 1000; transition: 0.4s; padding: 25px; box-sizing: border-box; border-right: 1px solid #333; overflow-y: auto; }
        .sidebar.active { transform: translateX(320px); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 999; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        .container { padding: 20px; }
        .card { width: 100%; margin-bottom: 20px; border-radius: 20px; padding: 22px; position: relative; box-sizing: border-box; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .unpaid { background: var(--card-unpaid); }
        .paid { background: var(--card-paid); }
        .debit { background: var(--card-debit); }
        
        .card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .card-label { font-size: 10px; font-weight: 900; letter-spacing: 1.5px; opacity: 0.7; }
        .vault-details { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 12px; margin: 10px 0; font-family: 'Courier New', monospace; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        
        button { padding: 14px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; font-size: 14px; margin-top: 10px;}
        .btn-action { background: #fff; color: #000; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; font-size: 14px; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>

    <header>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
        <div>
            <div class="app-title">ELITE WALLET</div>
            <div class="by-line">BY AMRIT KAR</div>
        </div>
    </header>

    <div class="tabs">
        <div id="tab-credit" class="tab active" onclick="switchTab('credit')">CREDIT CARDS</div>
        <div id="tab-debit" class="tab" onclick="switchTab('debit')">DEBIT CARDS</div>
    </div>

    <div class="overlay" onclick="toggleMenu()"></div>

    <div class="sidebar" id="sidebar">
        <div style="font-size: 18px; font-weight: bold; margin-bottom: 10px; color: var(--accent);">Control Center</div>
        <div id="g_id_onload" data-client_id="201507687807-o1ko23rr5j1odmibsa24vgn6gci61j8l.apps.googleusercontent.com" data-callback="onLogin"></div>
        <div class="g_id_signin" data-type="standard" data-theme="dark"></div>
        
        <hr>
        
        <div style="color:var(--accent); font-size:12px; font-weight:bold; margin-bottom:10px;">ADD NEW CREDIT CARD</div>
        <input type="text" id="c-bank" placeholder="Bank Name">
        <input type="text" id="c-num" placeholder="Full Card Number">
        <div style="display:flex; gap:10px;">
            <input type="text" id="c-exp" placeholder="MM/YY">
            <input type="password" id="c-cvv" placeholder="CVV">
        </div>
        <input type="number" id="c-limit" placeholder="Credit Limit">
        <input type="number" id="c-day" placeholder="Stmt Date (1-31)">
        <button style="background:var(--accent); color:black;" onclick="addCard('credit')">SAVE CREDIT CARD</button>

        <hr>

        <div style="color:var(--debit-accent); font-size:12px; font-weight:bold; margin-bottom:10px;">ADD NEW DEBIT CARD</div>
        <input type="text" id="d-bank" placeholder="Bank Name">
        <input type="text" id="d-num" placeholder="Full Card Number">
        <div style="display:flex; gap:10px;">
            <input type="text" id="d-exp" placeholder="MM/YY">
            <input type="password" id="d-cvv" placeholder="CVV">
        </div>
        <button style="background:var(--debit-accent); color:white;" onclick="addCard('debit')">SAVE DEBIT CARD</button>
    </div>

    <div class="container" id="list"></div>

    <script>
        let cards = JSON.parse(localStorage.getItem('EliteV30_Vault')) || { credit: [], debit: [] };
        let currentTab = 'credit';
        const today = new Date().getDate();
        const thisMonth = new Date().getMonth();

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.querySelector('.overlay').classList.toggle('active');
        }

        function switchTab(t) {
            currentTab = t;
            document.getElementById('tab-credit').className = 'tab' + (t === 'credit' ? ' active' : '');
            document.getElementById('tab-debit').className = 'tab' + (t === 'debit' ? ' active-debit' : '');
            render();
        }

        function onLogin(r) { alert("Recognized successfully!"); }

        function addCard(type) {
            const prefix = type === 'credit' ? 'c-' : 'd-';
            const bank = document.getElementById(prefix + 'bank').value;
            const num = document.getElementById(prefix + 'num').value;
            const exp = document.getElementById(prefix + 'exp').value;
            const cvv = document.getElementById(prefix + 'cvv').value;
            
            let newCard = { bank, num, exp, cvv, last4: num.slice(-4) };
            
            if(type === 'credit') {
                newCard.limit = document.getElementById('c-limit').value;
                newCard.day = parseInt(document.getElementById('c-day').value);
                newCard.lastPaidMonth = -1;
                cards.credit.push(newCard);
            } else {
                cards.debit.push(newCard);
            }
            
            save();
            toggleMenu();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function togglePaid(i) {
            const isPaid = cards.credit[i].lastPaidMonth === thisMonth;
            cards.credit[i].lastPaidMonth = isPaid ? -1 : thisMonth;
            if (!isPaid) {
                const d = new Date();
                cards.credit[i].paidDate = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
            }
            save();
        }

        function save() { localStorage.setItem('EliteV30_Vault', JSON.stringify(cards)); render(); }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            const items = cards[currentTab];

            if(items.length === 0) {
                list.innerHTML = `<div style="text-align:center; color:#444; margin-top:100px; font-weight:bold;">NO ${currentTab.toUpperCase()} CARDS FOUND</div>`;
                return;
            }

            items.forEach((c, i) => {
                const div = document.createElement('div');
                if(currentTab === 'credit') {
                    const isPaid = c.lastPaidMonth === thisMonth;
                    const isDue = today >= c.day;
                    const diff = c.day - today;
                    const isUpcoming = (diff <= 5 && diff > 0);
                    div.className = `card ${isPaid ? 'paid' : 'unpaid'}`;
                    
                    div.innerHTML = `
                        <div class="card-top"><span class="card-label">CREDIT CARD</span><span>XXXX ${c.last4}</span></div>
                        <div style="font-size:24px; font-weight:900;">${c.bank.toUpperCase()}</div>
                        <div class="vault-details">
                            ${c.num.replace(/\s?/g, '').replace(/(\d{4})/g, '$1 ')}<br>
                            <span style="font-size:10px; color:#aaa;">EXP: ${c.exp} | CVV: ***</span>
                        </div>
                        <div style="font-size:11px; font-weight:bold;">
                            ${isPaid ? '✅ SETTLED: ' + c.paidDate : (isDue ? '🚨 BILL GENERATED' : (isUpcoming ? '⌛ UPCOMING ('+diff+'d)' : '⏳ PENDING'))}
                        </div>
                        <div style="font-size:12px; margin-top:10px; opacity:0.8;">LIMIT: ₹${Number(c.limit).toLocaleString()} | STMT: ${c.day}th</div>
                        <button class="btn-action" onclick="togglePaid(${i})">${isPaid ? 'RESET' : 'MARK PAID'}</button>
                    `;
                } else {
                    div.className = `card debit`;
                    div.innerHTML = `
                        <div class="card-top"><span class="card-label" style="color:var(--debit-accent);">DEBIT CARD</span><span>XXXX ${c.last4}</span></div>
                        <div style="font-size:24px; font-weight:900;">${c.bank.toUpperCase()}</div>
                        <div class="vault-details">
                            ${c.num.replace(/\s?/g, '').replace(/(\d{4})/g, '$1 ')}<br>
                            <span style="font-size:10px; color:#aaa;">EXP: ${c.exp} | CVV: ***</span>
                        </div>
                        <button class="btn-action" style="background:var(--debit-accent); color:white;" onclick="alert('Card: ${c.num}\\nCVV: ${c.cvv}')">VIEW CVV</button>
                    `;
                }
                
                const removeBtn = document.createElement('button');
                removeBtn.style = "background:none; color:rgba(255,255,255,0.3); font-size:10px; margin-top:10px; border:1px solid rgba(255,255,255,0.1);";
                removeBtn.innerText = "Remove Card";
                removeBtn.onclick = () => { if(confirm('Delete?')){ cards[currentTab].splice(i,1); save(); }};
                div.appendChild(removeBtn);
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
